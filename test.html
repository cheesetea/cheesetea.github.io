<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>内网测试页面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      font-size: 26px;
      margin-bottom: 20px;
      color: #2d8cf0;
    }
    p {
      font-size: 16px;
      margin: 10px 0;
      color: #666;
    }
    .info {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ 服务启动成功</h1>
    <p>这是一个用于内网测试的 HTML 页面</p>
    <p>如果你能看到这个页面，说明部署正常</p>

    <div class="info">
      <p>可用于：接口测试、文件预览、内网展示</p>
      <p style="margin-top:8px; font-size:14px; color:#999">2026 测试页面</p>
    </div>
  </div>
</body>
</html>
